name: Notify Slack on Release

on:
  workflow_run:
    workflows: [Release]
    types: [completed]

permissions:
  contents: read

jobs:
  notify:
    runs-on: ubuntu-latest

    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    steps:
      - name: Get latest release
        id: release
        uses: actions/github-script@v7
        with:
          script: |
            const { data: release } = await github.rest.repos.getLatestRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
            })

            core.setOutput('name', release.name || release.tag_name)
            core.setOutput('tag', release.tag_name)
            core.setOutput('url', release.html_url)

      - name: Send Slack notification
        uses: slackapi/slack-github-action@v3.0.2
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
        with:
          channel-id: C0ATTTJNA7N
          payload: |
            {
              "text": ":rocket: New Yapa release published: *${{ steps.release.outputs.name }}*\n<${{ steps.release.outputs.url }}|View release>\nTag: `${{ steps.release.outputs.tag }}`"
            }
