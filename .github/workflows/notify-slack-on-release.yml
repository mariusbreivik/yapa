name: Notify Slack on Release

on:
  release:
    types: [published]

permissions:
  contents: read

jobs:
  notify:
    runs-on: ubuntu-latest

    steps:
      - name: Send Slack notification
        uses: slackapi/slack-github-action@v1.27.0
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
        with:
          channel-id: C0ATTTJNA7N
          payload: |
            {
              "text": ":rocket: New Yapa release published: *${{ github.event.release.name }}*\n<${{ github.event.release.html_url }}|View release>\nTag: `${{ github.event.release.tag_name }}`"
            }
