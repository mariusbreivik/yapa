name: Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag, for example v1.0.1
        required: true
        type: string
      build_number:
        description: Optional build number
        required: false
        type: string

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-latest

    env:
      XCODE_PROJECT: Yapa.xcodeproj
      XCODE_SCHEME: Yapa
      XCODE_CONFIG: Release

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build DMG
        env:
          RELEASE_TAG: ${{ inputs.tag }}
        run: |
          VERSION="${RELEASE_TAG#v}"
          BUILD_NUMBER="${{ inputs.build_number }}"
          if [ -z "$BUILD_NUMBER" ]; then
            BUILD_NUMBER="${{ github.run_number }}"
          fi
          MARKETING_VERSION="$VERSION" CURRENT_PROJECT_VERSION="$BUILD_NUMBER" bash Scripts/build-unsigned-dmg.sh

      - name: Rename DMG
        run: |
          VERSION="${{ inputs.tag }}"
          SOURCE="dist/Yapa-${VERSION}-unsigned.dmg"
          TARGET="dist/Yapa-${VERSION}.dmg"
          if [ -f "$SOURCE" ]; then
            mv "$SOURCE" "$TARGET"
          else
            echo "Missing DMG: $SOURCE" >&2
            exit 1
          fi

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.tag }}
          name: Yapa ${{ inputs.tag }}
          generate_release_notes: true
          files: dist/Yapa-${{ inputs.tag }}.dmg
