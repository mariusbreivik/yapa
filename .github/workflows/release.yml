name: Release

on:
  workflow_dispatch:
    inputs:
      build_number:
        description: Optional build number
        required: false
        type: string

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-latest

    env:
      XCODE_PROJECT: Yapa.xcodeproj
      XCODE_SCHEME: Yapa
      XCODE_CONFIG: Release

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Resolve latest release tag
        id: release_tag
        run: |
          TAG=$(git tag --merged origin/main --sort=-v:refname | grep '^v' | head -n 1)
          if [ -z "$TAG" ]; then
            echo "No release tag found on main" >&2
            exit 1
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=${TAG#v}" >> "$GITHUB_OUTPUT"

      - name: Build DMG
        run: |
          VERSION="${{ steps.release_tag.outputs.version }}"
          BUILD_NUMBER="${{ inputs.build_number }}"
          if [ -z "$BUILD_NUMBER" ]; then
            BUILD_NUMBER="${{ github.run_number }}"
          fi
          MARKETING_VERSION="$VERSION" CURRENT_PROJECT_VERSION="$BUILD_NUMBER" bash Scripts/build-unsigned-dmg.sh

      - name: Rename DMG
        run: |
          VERSION="${{ steps.release_tag.outputs.version }}"
          SOURCE="dist/Yapa-${VERSION}-unsigned.dmg"
          TARGET="dist/Yapa-${VERSION}.dmg"
          if [ -f "$SOURCE" ]; then
            mv "$SOURCE" "$TARGET"
          else
            echo "Missing DMG: $SOURCE" >&2
            exit 1
          fi

      - name: Generate release notes
        id: release_notes
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('node:fs')
            const { execSync } = require('node:child_process')

            const currentTag = '${{ steps.release_tag.outputs.tag }}'
            const previousTag = execSync(
              `git tag --sort=-v:refname | grep '^v' | grep -v '^${currentTag}$' | head -n 1`,
              { encoding: 'utf8' }
            ).trim()

            const range = previousTag ? `${previousTag}..HEAD` : 'HEAD'
            const commits = execSync(`git log --format=%H%n%s%n%b%n--END-- ${range}`, { encoding: 'utf8' })
              .split('\n--END--\n')
              .map(block => block.trim())
              .filter(Boolean)

            const sections = new Map([
              ['Added', []],
              ['Changed', []],
              ['Fixed', []],
              ['Docs', []],
              ['Other', []],
            ])

            const seen = new Set()
            const normalizeTitle = (title) => title.replace(/^\w+(\(.+\))?:\s*/i, '').trim()

            for (const block of commits) {
              const [sha, title = ''] = block.split('\n')
              if (!sha || seen.has(sha)) continue
              seen.add(sha)

              let section = 'Other'
              if (/^feat(\(.+\))?:/i.test(title)) section = 'Added'
              else if (/^fix(\(.+\))?:/i.test(title)) section = 'Fixed'
              else if (/^docs(\(.+\))?:/i.test(title)) section = 'Docs'
              else if (/^refactor(\(.+\))?:/i.test(title) || /^chore(\(.+\))?:/i.test(title)) section = 'Changed'

              let prNumber = null
              let author = null
              try {
                const prs = await github.rest.repos.listPullRequestsAssociatedWithCommit({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  commit_sha: sha,
                })
                prNumber = prs.data[0]?.number ?? null
                author = prs.data[0]?.user?.login ?? null
              } catch {
                prNumber = null
                author = null
              }

              const cleanTitle = normalizeTitle(title)
              const authorSuffix = author ? ` by @${author}` : ''
              const label = prNumber ? `#${prNumber}` : sha.slice(0, 7)
              const link = prNumber ? ` ([${label}](${context.payload.repository.html_url}/pull/${prNumber}))` : ` (${label})`
              const entry = `- ${cleanTitle}${authorSuffix}${link}`

              sections.get(section).push(entry)
            }

            const lines = [
              `## Yapa ${currentTag}`,
              '',
              `Compare changes since ${previousTag || 'the beginning of the repo'}.`,
              '',
            ]

            for (const [section, entries] of sections) {
              if (entries.length === 0) continue
              lines.push(`### ${section}`)
              lines.push(...entries)
              lines.push('')
            }

            const body = lines.join('\n').trim() + '\n'
            fs.writeFileSync('dist/release-notes.md', body)
            core.setOutput('body_path', 'dist/release-notes.md')

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release_tag.outputs.tag }}
          name: Yapa ${{ steps.release_tag.outputs.tag }}
          body_path: dist/release-notes.md
          files: dist/Yapa-${{ steps.release_tag.outputs.version }}.dmg
