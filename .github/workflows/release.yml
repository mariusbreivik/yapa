name: Release

on:
  workflow_dispatch:
    inputs:
      build_number:
        description: Optional build number
        required: false
        type: string

permissions:
  contents: write
  pull-requests: read

jobs:
  release:
    runs-on: macos-latest

    env:
      XCODE_PROJECT: Yapa.xcodeproj
      XCODE_SCHEME: Yapa
      XCODE_CONFIG: Release

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: main
          fetch-depth: 0

      - name: Compute next release tag
        id: release_tag
        run: |
          latestTag=$(git tag --sort=-v:refname | grep '^v' | head -n 1)
          if [ -z "$latestTag" ]; then
            echo "No existing release tag found" >&2
            exit 1
          fi

          current=${latestTag#v}
          major=${current%%.*}
          rest=${current#*.}
          minor=${rest%%.*}
          patch=${current##*.}

          commit_title=$(git log -1 --format=%s origin/main)
          normalized=$(printf '%s' "$commit_title" | tr -d '\r')

          if printf '%s' "$normalized" | grep -Eq '(^|[[:space:]])(BREAKING CHANGE:|.+!:)' ; then
            next="$((major + 1)).0.0"
          elif printf '%s' "$normalized" | grep -Eq '^feat(\(.+\))?:' ; then
            next="$major.$((minor + 1)).0"
          elif printf '%s' "$normalized" | grep -Eq '^fix(\(.+\))?:' ; then
            next="$major.$minor.$((patch + 1))"
          else
            next="$major.$minor.$((patch + 1))"
          fi

          echo "previous_tag=$latestTag" >> "$GITHUB_OUTPUT"
          echo "tag=v$next" >> "$GITHUB_OUTPUT"
          echo "version=$next" >> "$GITHUB_OUTPUT"

      - name: Create release tag
        run: |
          TAG='${{ steps.release_tag.outputs.tag }}'
          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "Tag already exists: $TAG"
            exit 0
          fi
          git tag -a "$TAG" -m "$TAG"
          git push origin "$TAG"

      - name: Build DMG
        run: |
          VERSION="${{ steps.release_tag.outputs.version }}"
          BUILD_NUMBER="${{ inputs.build_number }}"
          if [ -z "$BUILD_NUMBER" ]; then
            BUILD_NUMBER="${{ github.run_number }}"
          fi
          MARKETING_VERSION="$VERSION" CURRENT_PROJECT_VERSION="$BUILD_NUMBER" bash Scripts/build-unsigned-dmg.sh

      - name: Rename DMG
        run: |
          VERSION="${{ steps.release_tag.outputs.version }}"
          SOURCE="dist/Yapa-${VERSION}-unsigned.dmg"
          TARGET="dist/Yapa-${VERSION}.dmg"
          if [ -f "$SOURCE" ]; then
            mv "$SOURCE" "$TARGET"
          else
            echo "Missing DMG: $SOURCE" >&2
            exit 1
          fi

      - name: Generate release notes
        id: release_notes
        uses: mikepenz/release-changelog-builder-action@v6
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          owner: ${{ github.repository_owner }}
          repo: ${{ github.event.repository.name }}
          fromTag: ${{ steps.release_tag.outputs.previous_tag }}
          toTag: ${{ steps.release_tag.outputs.tag }}
          configuration: .github/release-changelog-builder.config.json

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release_tag.outputs.tag }}
          name: Yapa ${{ steps.release_tag.outputs.tag }}
          body: ${{ steps.release_notes.outputs.changelog }}
          files: dist/Yapa-${{ steps.release_tag.outputs.version }}.dmg
