name: Release

on:
  workflow_dispatch:
    inputs:
      build_number:
        description: Optional build number
        required: false
        type: string

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-latest

    env:
      XCODE_PROJECT: Yapa.xcodeproj
      XCODE_SCHEME: Yapa
      XCODE_CONFIG: Release

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Resolve latest release tag
        id: release_tag
        run: |
          TAG=$(git tag --merged origin/main --sort=-v:refname | grep '^v' | head -n 1)
          if [ -z "$TAG" ]; then
            echo "No release tag found on main" >&2
            exit 1
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=${TAG#v}" >> "$GITHUB_OUTPUT"

      - name: Resolve previous release tag
        id: previous_release_tag
        run: |
          CURRENT_TAG="${{ steps.release_tag.outputs.tag }}"
          TAG=$(git tag --sort=-v:refname | grep '^v' | grep -v "^${CURRENT_TAG}$" | head -n 1)
          if [ -z "$TAG" ]; then
            echo "tag=" >> "$GITHUB_OUTPUT"
          else
            echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          fi

      - name: Build DMG
        run: |
          VERSION="${{ steps.release_tag.outputs.version }}"
          BUILD_NUMBER="${{ inputs.build_number }}"
          if [ -z "$BUILD_NUMBER" ]; then
            BUILD_NUMBER="${{ github.run_number }}"
          fi
          MARKETING_VERSION="$VERSION" CURRENT_PROJECT_VERSION="$BUILD_NUMBER" bash Scripts/build-unsigned-dmg.sh

      - name: Rename DMG
        run: |
          VERSION="${{ steps.release_tag.outputs.version }}"
          SOURCE="dist/Yapa-${VERSION}-unsigned.dmg"
          TARGET="dist/Yapa-${VERSION}.dmg"
          if [ -f "$SOURCE" ]; then
            mv "$SOURCE" "$TARGET"
          else
            echo "Missing DMG: $SOURCE" >&2
            exit 1
          fi

      - name: Generate release notes
        id: release_notes
        uses: mikepenz/release-changelog-builder-action@v6
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          owner: ${{ github.repository_owner }}
          repo: ${{ github.event.repository.name }}
          fromTag: ${{ steps.previous_release_tag.outputs.tag }}
          toTag: ${{ steps.release_tag.outputs.tag }}
          configuration: .github/release-changelog-builder.config.json

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release_tag.outputs.tag }}
          name: Yapa ${{ steps.release_tag.outputs.tag }}
          body: ${{ steps.release_notes.outputs.changelog }}
          files: dist/Yapa-${{ steps.release_tag.outputs.version }}.dmg
