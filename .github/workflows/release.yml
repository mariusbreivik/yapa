name: Release

on:
  workflow_dispatch:
    inputs:
      build_number:
        description: Optional build number
        required: false
        type: string

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-latest

    env:
      XCODE_PROJECT: Yapa.xcodeproj
      XCODE_SCHEME: Yapa
      XCODE_CONFIG: Release

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Resolve latest release tag
        id: release_tag
        run: |
          TAG=$(git tag --merged origin/main --sort=-v:refname | grep '^v' | head -n 1)
          if [ -z "$TAG" ]; then
            echo "No release tag found on main" >&2
            exit 1
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Build DMG
        run: |
          VERSION="${{ steps.release_tag.outputs.tag }}"
          VERSION="${VERSION#v}"
          BUILD_NUMBER="${{ inputs.build_number }}"
          if [ -z "$BUILD_NUMBER" ]; then
            BUILD_NUMBER="${{ github.run_number }}"
          fi
          MARKETING_VERSION="$VERSION" CURRENT_PROJECT_VERSION="$BUILD_NUMBER" bash Scripts/build-unsigned-dmg.sh

      - name: Rename DMG
        run: |
          VERSION="${{ steps.release_tag.outputs.tag }}"
          SOURCE="dist/Yapa-${VERSION}-unsigned.dmg"
          TARGET="dist/Yapa-${VERSION}.dmg"
          if [ -f "$SOURCE" ]; then
            mv "$SOURCE" "$TARGET"
          else
            echo "Missing DMG: $SOURCE" >&2
            exit 1
          fi

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release_tag.outputs.tag }}
          name: Yapa ${{ steps.release_tag.outputs.tag }}
          generate_release_notes: true
          files: dist/Yapa-${{ steps.release_tag.outputs.tag }}.dmg
